<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Interactive Stanford Bunny (WebGL – Self-contained)</title>
<style>
  body { margin:0; overflow:hidden; background:#111; font-family:Arial, sans-serif; }
  canvas { 
    display: block; 
    /* touch-action: none;  ← REMOVED to allow pinch-to-zoom */
    /* touch-action: auto;  ← This is the default, so we can omit it */
  }
  #info {
    position: absolute;
    top: 12px;
    left: 12px;
    color: #eee;
    background: rgba(0,0,0,0.6);
    padding: 8px 14px;
    border-radius: 6px;
    pointer-events: none;
    user-select: none;
    font-size: 13px;
    z-index: 10;
  }
</style>
</head>
<body>
<div id="info">Drag (one finger) to rotate • Pinch (two fingers) to zoom • Stanford Bunny</div>
<canvas id="gl-canvas"></canvas>

<script>
// ─── Minimal math helpers ───────────────────────────────────────
function vec3(x,y,z) { return [x,y,z]; }
function flatten(arr) { return new Float32Array(arr.flat()); }

function lookAt(eye, center, up) {
  let z = vec3(eye[0]-center[0], eye[1]-center[1], eye[2]-center[2]);
  const lenZ = Math.hypot(...z) || 1; z = z.map(v => v/lenZ);
  let x = [up[1]*z[2] - up[2]*z[1], up[2]*z[0] - up[0]*z[2], up[0]*z[1] - up[1]*z[0]];
  const lenX = Math.hypot(...x) || 1; x = x.map(v => v/lenX);
  const y = [z[1]*x[2] - z[2]*x[1], z[2]*x[0] - z[0]*x[2], z[0]*x[1] - z[1]*x[0]];
  return flatten([
    x[0], y[0], z[0], 0,
    x[1], y[1], z[1], 0,
    x[2], y[2], z[2], 0,
    -(x[0]*eye[0] + x[1]*eye[1] + x[2]*eye[2]),
    -(y[0]*eye[0] + y[1]*eye[1] + y[2]*eye[2]),
    -(z[0]*eye[0] + z[1]*eye[1] + z[2]*eye[2]), 1
  ]);
}

function perspective(fovy, aspect, near, far) {
  const f = 1 / Math.tan(fovy / 2);
  const nf = 1 / (near - far);
  return new Float32Array([
    f / aspect, 0, 0, 0,
    0, f, 0, 0,
    0, 0, (far + near) * nf, -1,
    0, 0, (2 * far * near) * nf, 0
  ]);
}

// ─── WebGL setup ────────────────────────────────────────────────
const canvas = document.getElementById("gl-canvas");
const gl = canvas.getContext("webgl");
if (!gl) { alert("WebGL not supported"); throw new Error("No WebGL"); }

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
});

gl.viewport(0, 0, canvas.width, canvas.height);
gl.clearColor(0.08, 0.09, 0.12, 1);
gl.enable(gl.DEPTH_TEST);
gl.enable(gl.CULL_FACE);

// ─── Shaders ────────────────────────────────────────────────────
const vs = `#version 100
attribute vec3 aPos;
attribute vec3 aNorm;
uniform mat4 uMV;
uniform mat4 uProj;
varying vec3 vNorm;
void main() {
  vec4 worldPos = uMV * vec4(aPos, 1.0);
  vNorm = mat3(uMV) * aNorm;
  gl_Position = uProj * worldPos;
}`;

const fs = `#version 100
precision mediump float;
varying vec3 vNorm;
uniform vec4 uColor;
void main() {
  vec3 light = normalize(vec3(0.4, 0.9, 0.7));
  float diff = max(dot(normalize(vNorm), light), 0.0);
  vec3 ambient = vec3(0.22);
  vec3 col = uColor.rgb * (ambient + diff * 0.9);
  gl_FragColor = vec4(col, uColor.a);
}`;

// Compile shader
function compile(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    console.error("Shader compile error:", gl.getShaderInfoLog(sh));
    gl.deleteShader(sh);
    return null;
  }
  return sh;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const locPos   = gl.getAttribLocation(prog, "aPos");
const locNorm  = gl.getAttribLocation(prog, "aNorm");
const locMV    = gl.getUniformLocation(prog, "uMV");
const locProj  = gl.getUniformLocation(prog, "uProj");
const locColor = gl.getUniformLocation(prog, "uColor");

// ─── OBJ Loader + Parser + Normals ──────────────────────────────
async function loadBunny() {
  try {
    const response = await fetch('bunny.obj');
    if (!response.ok) throw new Error(`HTTP ${response.status} loading bunny.obj`);
    const text = await response.text();
    const lines = text.split('\n');

    const rawVertices = [];
    const faces = [];

    lines.forEach(line => {
      const trimmed = line.trim();
      if (!trimmed || trimmed.startsWith('#')) return;
      const parts = trimmed.split(/\s+/);
      if (parts[0] === 'v') {
        rawVertices.push(parseFloat(parts[1]), parseFloat(parts[2]), parseFloat(parts[3]));
      } else if (parts[0] === 'f') {
        const a = parseInt(parts[1]) - 1;
        const b = parseInt(parts[2]) - 1;
        const c = parseInt(parts[3]) - 1;
        faces.push(a, b, c);
      }
    });

    // Center & scale
    let min = [Infinity,Infinity,Infinity];
    let max = [-Infinity,-Infinity,-Infinity];
    for (let i = 0; i < rawVertices.length; i += 3) {
      min[0] = Math.min(min[0], rawVertices[i+0]);
      min[1] = Math.min(min[1], rawVertices[i+1]);
      min[2] = Math.min(min[2], rawVertices[i+2]);
      max[0] = Math.max(max[0], rawVertices[i+0]);
      max[1] = Math.max(max[1], rawVertices[i+1]);
      max[2] = Math.max(max[2], rawVertices[i+2]);
    }
    const center = [(min[0]+max[0])/2, (min[1]+max[1])/2, (min[2]+max[2])/2];
    const size = Math.max(max[0]-min[0], max[1]-min[1], max[2]-min[2]);
    const scaleFactor = 2.2 / size;

    const positions = new Float32Array(rawVertices.length);
    for (let i = 0; i < rawVertices.length; i += 3) {
      positions[i+0] = (rawVertices[i+0] - center[0]) * scaleFactor;
      positions[i+1] = (rawVertices[i+1] - center[1]) * scaleFactor - 0.35;
      positions[i+2] = (rawVertices[i+2] - center[2]) * scaleFactor;
    }

    // Compute smooth per-vertex normals
    const normals = new Float32Array(rawVertices.length);
    const accum = new Array(rawVertices.length / 3).fill().map(() => [0,0,0]);

    for (let i = 0; i < faces.length; i += 3) {
      const a = faces[i+0] * 3, b = faces[i+1] * 3, c = faces[i+2] * 3;
      const v1 = [positions[a], positions[a+1], positions[a+2]];
      const v2 = [positions[b], positions[b+1], positions[b+2]];
      const v3 = [positions[c], positions[c+1], positions[c+2]];

      const u = [v2[0]-v1[0], v2[1]-v1[1], v2[2]-v1[2]];
      const vv = [v3[0]-v1[0], v3[1]-v1[1], v3[2]-v1[2]];
      let nx = u[1]*vv[2] - u[2]*vv[1];
      let ny = u[2]*vv[0] - u[0]*vv[2];
      let nz = u[0]*vv[1] - u[1]*vv[0];
      const len = Math.hypot(nx, ny, nz) || 1;
      nx /= len; ny /= len; nz /= len;

      accum[faces[i+0]][0] += nx; accum[faces[i+0]][1] += ny; accum[faces[i+0]][2] += nz;
      accum[faces[i+1]][0] += nx; accum[faces[i+1]][1] += ny; accum[faces[i+1]][2] += nz;
      accum[faces[i+2]][0] += nx; accum[faces[i+2]][1] += ny; accum[faces[i+2]][2] += nz;
    }

    for (let i = 0; i < accum.length; i++) {
      const len = Math.hypot(...accum[i]) || 1;
      normals[i*3+0] = accum[i][0] / len;
      normals[i*3+1] = accum[i][1] / len;
      normals[i*3+2] = accum[i][2] / len;
    }

    return {
      positions,
      normals,
      indices: new Uint16Array(faces),
      count: faces.length
    };
  } catch (err) {
    console.error("Failed to load/parse bunny.obj:", err);
    alert("Could not load bunny.obj – check console, file path & permissions.");
    return null;
  }
}

// ─── Buffers & global state ─────────────────────────────────────
let bunnyBuffers = null;
let theta = 0.0;
let phi   = Math.PI / 2;
let radius = 2.8;
let autoRotate = true;
let isDragging = false;
let prevX = 0, prevY = 0;

// Load bunny async
(async () => {
  const data = await loadBunny();
  if (!data) return;

  const posBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
  gl.bufferData(gl.ARRAY_BUFFER, data.positions, gl.STATIC_DRAW);

  const normBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, normBuf);
  gl.bufferData(gl.ARRAY_BUFFER, data.normals, gl.STATIC_DRAW);

  const idxBuf = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, data.indices, gl.STATIC_DRAW);

  bunnyBuffers = {
    pos: posBuf,
    norm: normBuf,
    idx: idxBuf,
    count: data.count
  };

  requestAnimationFrame(render);
})();

// ─── Input: Mouse + Touch ───────────────────────────────────────
canvas.addEventListener("mousedown", e => {
  isDragging = true;
  prevX = e.clientX;
  prevY = e.clientY;
  autoRotate = false;
  e.preventDefault();
});

canvas.addEventListener("mousemove", e => {
  if (!isDragging) return;
  const dx = e.clientX - prevX;
  const dy = e.clientY - prevY;
  theta += dx * 0.006;
  phi   += dy * 0.006;
  phi = Math.max(0.2, Math.min(Math.PI - 0.2, phi));
  prevX = e.clientX;
  prevY = e.clientY;
});

window.addEventListener("mouseup",   () => isDragging = false);
window.addEventListener("mouseleave",() => isDragging = false);

// Touch support (mobile/tablet)
canvas.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    isDragging = true;
    prevX = e.touches[0].clientX;
    prevY = e.touches[0].clientY;
    autoRotate = false;
  }
  // Do NOT preventDefault here — allows pinch gesture to begin
}, { passive: true });

canvas.addEventListener("touchmove", e => {
  if (e.touches.length === 1 && isDragging) {
    // Single finger drag: rotate + block page scroll
    const dx = e.touches[0].clientX - prevX;
    const dy = e.touches[0].clientY - prevY;
    theta += dx * 0.006;
    phi   += dy * 0.006;
    phi = Math.max(0.2, Math.min(Math.PI - 0.2, phi));
    prevX = e.touches[0].clientX;
    prevY = e.touches[0].clientY;

    e.preventDefault();  // Blocks page scrolling during rotation
  }
  // 2+ fingers: do nothing → browser handles pinch-to-zoom
}, { passive: false });

canvas.addEventListener("touchend", e => {
  if (e.touches.length === 0) {
    isDragging = false;
  }
}, { passive: true });

// Wheel zoom (desktop & some touchpads)
canvas.addEventListener("wheel", e => {
  radius += e.deltaY * 0.004;
  radius = Math.max(1.5, Math.min(6.0, radius));
  e.preventDefault();
});

// ─── Render loop ────────────────────────────────────────────────
function render(now) {
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  if (autoRotate) theta += 0.0006;

  const eye = vec3(
    radius * Math.cos(phi) * Math.sin(theta),
    radius * Math.sin(phi),
    radius * Math.cos(phi) * Math.cos(theta)
  );

  const mv   = lookAt(eye, vec3(0, 0.05, 0), vec3(0,1,0));
  const proj = perspective(Math.PI/3.5, canvas.width/canvas.height, 0.1, 20);

  gl.uniformMatrix4fv(locMV,   false, mv);
  gl.uniformMatrix4fv(locProj, false, proj);

  if (bunnyBuffers) {
    gl.bindBuffer(gl.ARRAY_BUFFER, bunnyBuffers.pos);
    gl.vertexAttribPointer(locPos, 3, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(locPos);

    gl.bindBuffer(gl.ARRAY_BUFFER, bunnyBuffers.norm);
    gl.vertexAttribPointer(locNorm, 3, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(locNorm);

    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, bunnyBuffers.idx);

    gl.uniform4f(locColor, 0.96, 0.90, 0.84, 1.0);
    gl.drawElements(gl.TRIANGLES, bunnyBuffers.count, gl.UNSIGNED_SHORT, 0);
  }

  requestAnimationFrame(render);
}
</script>
</body>
</html>
