<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Painter's Flags on Conic Section • WebGL</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: system-ui, sans-serif;
            background: rgba(0,0,0,0.5);
            padding: 8px 12px;
            border-radius: 6px;
            pointer-events: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div id="info">Painter's Flags on Invisible Conic Section • Multicolored &amp; Translucent • Drag mouse to rotate • Scroll to zoom</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script>
    // =============== Painter's Flags on Conic Section WebGL ===============
    // Exactly as requested: multicolored, translucent flags "plastered" on
    // an invisible conic section (faint wireframe cone for reference only),
    // descending from the top. Flags have a painterly striped look and wave gently.
    // Fully interactive (OrbitControls). Copy-paste into a .html file and open.

    let scene, camera, renderer, controls, clock;
    let flags = [];

    // Scene parameters
    const NUM_RINGS = 6;
    const FLAGS_PER_RING = 16;
    const CONE_HEIGHT = 15;
    const BASE_RADIUS = 7.5;
    const APEX_Y = 9;           // cone descends from top

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0f1f);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 22);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        clock = new THREE.Clock();

        // Lights – soft and painterly
        const ambient = new THREE.AmbientLight(0x99aaff, 0.6);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffeecc, 1.2);
        dirLight.position.set(12, 18, 8);
        scene.add(dirLight);
        const dirLight2 = new THREE.DirectionalLight(0xaaffdd, 0.8);
        dirLight2.position.set(-15, 10, -10);
        scene.add(dirLight2);

        // Invisible conic section (faint wireframe only – you can delete this block for 100% invisible)
        const coneGeo = new THREE.ConeGeometry(BASE_RADIUS, CONE_HEIGHT, 64, 8, true);
        const coneMat = new THREE.MeshBasicMaterial({
            color: 0x88ddff,
            wireframe: true,
            transparent: true,
            opacity: 0.08,
            side: THREE.DoubleSide
        });
        const cone = new THREE.Mesh(coneGeo, coneMat);
        cone.position.y = APEX_Y - CONE_HEIGHT / 2;
        scene.add(cone);

        // Custom shader for painterly waving translucent flags
        const vertexShader = `
            uniform float time;
            varying vec2 vUv;
            void main() {
                vUv = uv;
                vec3 pos = position;
                // Gentle wave (more movement farther from "pole" side)
                float wave = sin(time * 3.0 + pos.x * 5.0) * (0.22 * uv.x);
                pos.z += wave;
                // Tiny vertical ripple for painterly fabric feel
                pos.y += sin(time * 2.5 + pos.x * 3.0) * 0.06 * (1.0 - uv.x);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const fragmentShader = `
            uniform vec3 flagColor;
            varying vec2 vUv;
            void main() {
                vec3 col = flagColor;
                // Painterly brush-stroke stripes
                float stripe = sin(vUv.x * 28.0) * 0.12 + sin(vUv.y * 14.0) * 0.08;
                col += stripe;
                // Slight color variation for multicolored feel
                col = mix(col, vec3(1.0, 0.95, 0.9), 0.1 * sin(vUv.x * 40.0));
                gl_FragColor = vec4(col, 0.78); // translucent
            }
        `;

        const flagWidth = 1.85;
        const flagHeight = 1.25;

        for (let ring = 0; ring < NUM_RINGS; ring++) {
            const progress = (ring + 0.6) / NUM_RINGS; // start slightly below apex
            const y = APEX_Y - progress * CONE_HEIGHT;
            const radius = progress * BASE_RADIUS;

            for (let i = 0; i < FLAGS_PER_RING; i++) {
                const theta = (i / FLAGS_PER_RING) * Math.PI * 2 + (ring * 0.3); // slight spiral offset

                const x = radius * Math.cos(theta);
                const z = radius * Math.sin(theta);

                const geometry = new THREE.PlaneGeometry(flagWidth, flagHeight, 18, 8);

                // Vibrant random painterly color
                const hue = (ring * 0.15 + i * 0.07) % 1.0;
                const color = new THREE.Color().setHSL(hue, 0.92, 0.62);

                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        time: { value: 0 },
                        flagColor: { value: color }
                    },
                    vertexShader: vertexShader,
                    fragmentShader: fragmentShader,
                    transparent: true,
                    side: THREE.DoubleSide,
                    depthWrite: false
                });

                const flag = new THREE.Mesh(geometry, material);
                flag.position.set(x, y, z);

                // Plaster the flag onto the conic surface (tangent orientation)
                flag.lookAt(flag.position.clone().add(new THREE.Vector3(x, 0, z).normalize().multiplyScalar(20)));
                flag.rotateY(Math.PI / 2); // fine-tune so the flag lies flat against the cone

                scene.add(flag);
                flags.push(flag);
            }
        }

        // Orbit controls for full interactivity
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.12;
        controls.minDistance = 8;
        controls.maxDistance = 40;
        controls.target.set(0, 1, 0);

        window.addEventListener('resize', onResize);
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();

        // Update all flag shaders (wave + painterly effect)
        for (let i = 0; i < flags.length; i++) {
            const mat = flags[i].material;
            mat.uniforms.time.value = elapsed + i * 0.03; // staggered timing for organic feel
        }

        controls.update();
        renderer.render(scene, camera);
    }

    // Start everything
    init();
    animate();
</script>
</body>
</html>
