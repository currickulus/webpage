<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currickulus - Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #topbar { background: #111; border-bottom: 1px solid #00ff00; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; font-family: 'Courier New', monospace; font-size: 12px; color: #00ff00; }
    #terminal { flex: 1; padding: 8px; }
    #status { color: #888; }
    #status.connected { color: #00ff00; }
    #status.error { color: #ff3333; }
    a { color: #00ff00; text-decoration: none; font-family: 'Courier New', monospace; font-size: 12px; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="topbar">
    <span>currickulus.xyz :: terminal</span>
    <span id="status">connecting...</span>
    <a href="/">home</a>
  </div>
  <div id="terminal"></div>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const statusEl = document.getElementById('status');
    if (!token) { window.location.href = '/auth.html'; }
    const term = new Terminal({ cursorBlink: true, fontSize: 14, fontFamily: '"Courier New", monospace', theme: { background: '#000000', foreground: '#00ff00', cursor: '#00ff00', selection: 'rgba(0,255,0,0.3)' } });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(protocol + '//' + window.location.host + '/terminal?token=' + token);
    ws.onopen = () => { statusEl.textContent = 'connected'; statusEl.className = 'connected'; ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows })); };
    ws.onmessage = e => term.write(e.data);
    ws.onclose = () => { statusEl.textContent = 'disconnected'; statusEl.className = 'error'; term.write('\r\n\r\n[connection closed]\r\n'); };
    ws.onerror = () => { statusEl.textContent = 'error'; statusEl.className = 'error'; };
    term.onData(data => { if (ws.readyState === WebSocket.OPEN) ws.send(data); });
    window.addEventListener('resize', () => { fitAddon.fit(); if (ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows })); } });
  </script>
</body>
</html>
