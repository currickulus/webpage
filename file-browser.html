<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currickulus - Files</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #topbar { background: #111; border-bottom: 1px solid #00ff00; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; flex-shrink: 0; }
    #path { color: #888; font-size: 12px; padding: 8px 16px; border-bottom: 1px solid #222; flex-shrink: 0; }
    #path span { color: #00ff00; }
    #filelist { flex: 1; overflow-y: auto; padding: 8px 0; }
    .entry { padding: 6px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px; border-bottom: 1px solid #0a0a0a; }
    .entry:hover { background: #0d1f0d; }
    .entry .icon { color: #00aa00; width: 16px; text-align: center; }
    .entry.dir .name { color: #00ff00; }
    .entry.file .name { color: #888; }
    .entry.file:hover .name { color: #00ff00; }
    #preview { position: fixed; top: 0; right: 0; width: 50%; height: 100vh; background: #0a0a0a; border-left: 1px solid #00ff00; display: none; flex-direction: column; z-index: 10; }
    #preview.open { display: flex; }
    #preview-header { padding: 10px 16px; border-bottom: 1px solid #00ff00; display: flex; justify-content: space-between; align-items: center; font-size: 12px; flex-shrink: 0; }
    #preview-content { flex: 1; overflow: auto; padding: 16px; font-size: 12px; line-height: 1.6; color: #aaa; white-space: pre-wrap; word-break: break-all; }
    #close-preview { cursor: pointer; color: #ff3333; font-size: 16px; background: none; border: none; color: #ff3333; font-family: 'Courier New', monospace; }
    a { color: #00ff00; text-decoration: none; font-size: 12px; }
    .up { color: #555; }
    .up:hover { color: #00ff00; }
    #error { color: #ff3333; padding: 16px; display: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #00ff00; }
  </style>
</head>
<body>
  <div id="topbar">
    <span>currickulus.xyz :: files</span>
    <a href="/">home</a>
  </div>
  <div id="path">path: <span id="current-path">/home/x</span></div>
  <div id="error"></div>
  <div id="filelist"></div>
  <div id="preview">
    <div id="preview-header">
      <span id="preview-filename"></span>
      <button id="close-preview" onclick="closePreview()">✕</button>
    </div>
    <div id="preview-content"></div>
  </div>
  <script>
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = '/auth.html'; }

    let currentPath = '/home/x';

    async function loadDir(path) {
      const res = await fetch('/api/files?path=' + encodeURIComponent(path), {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.status === 401) { window.location.href = '/auth.html'; return; }
      if (!res.ok) { showError('Could not read directory'); return; }
      const data = await res.json();
      currentPath = data.path;
      document.getElementById('current-path').textContent = currentPath;
      renderList(data.items);
    }

    function renderList(items) {
      const list = document.getElementById('filelist');
      list.innerHTML = '';
      if (currentPath !== '/home/x') {
        const up = document.createElement('div');
        up.className = 'entry dir up';
        up.innerHTML = '<span class="icon">↑</span><span class="name">../</span>';
        up.onclick = () => loadDir(currentPath.split('/').slice(0, -1).join('/') || '/home/x');
        list.appendChild(up);
      }
      const dirs  = items.filter(i => i.type === 'dir').sort((a,b) => a.name.localeCompare(b.name));
      const files = items.filter(i => i.type === 'file').sort((a,b) => a.name.localeCompare(b.name));
      [...dirs, ...files].forEach(item => {
        const el = document.createElement('div');
        el.className = 'entry ' + item.type;
        el.innerHTML = '<span class="icon">' + (item.type === 'dir' ? '▶' : '·') + '</span><span class="name">' + item.name + (item.type === 'dir' ? '/' : '') + '</span>';
        if (item.type === 'dir') {
          el.onclick = () => loadDir(item.path);
        } else {
          el.onclick = () => previewFile(item.path, item.name);
        }
        list.appendChild(el);
      });
    }

    async function previewFile(path, name) {
      const res = await fetch('/api/file?path=' + encodeURIComponent(path), {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) { showError('Could not read file'); return; }
      const data = await res.json();
      document.getElementById('preview-filename').textContent = name;
      document.getElementById('preview-content').textContent = data.content;
      document.getElementById('preview').classList.add('open');
    }

    function closePreview() {
      document.getElementById('preview').classList.remove('open');
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    loadDir(currentPath);
  </script>
</body>
</html>
