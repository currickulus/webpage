<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Interactive Utah Teapot - Tessellation Slider (Three.js)</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background: #000; }
    canvas { display: block; }
    #controls {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(0,0,0,0.6);
      color: #eee;
      padding: 12px 16px;
      border-radius: 8px;
      z-index: 10;
      user-select: none;
    }
    #controls label { margin-right: 8px; }
    #levelVal { font-weight: bold; min-width: 30px; display: inline-block; }
  </style>
</head>
<body>
  <div id="controls">
    <label for="tessSlider">Tessellation Level:</label>
    <input type="range" id="tessSlider" min="3" max="25" value="10" step="1">
    <span id="levelVal">10</span>
  </div>


  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
</script>
  <script type="module">
   import * as THREE from 'three';
  import { TeapotGeometry } from 'three/addons/geometries/TeapotGeometry.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x112233);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 4, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 1, 0);

   // Keep some ambient light so the "dark" side isn't pitch black
scene.add(new THREE.AmbientLight(0x404040, 1.0)); 

// Create the headlight
const headlight = new THREE.DirectionalLight(0xffffff, 2.5);
// Position it at the camera's location (0,0,1 in camera-space)
headlight.position.set(0, 0, 1); 

// Add the light to the camera
camera.add(headlight);

// Add the camera to the scene (Crucial! Otherwise the light won't show up)
scene.add(camera);    const material = new THREE.MeshPhongMaterial({
  color: 0xffcc88,
  specular: 0xffffff,
  shininess: 100,
  side: THREE.DoubleSide,
  wireframe: false // Change this to true to see the triangles!
});
    let teapot = null;

    function createTeapot(segments) {
      if (teapot) {
        if (teapot.geometry) teapot.geometry.dispose();
        scene.remove(teapot);
      }

      const geometry = new TeapotGeometry(4.0, segments, true, true, true, true, true);

      teapot = new THREE.Mesh(geometry, material);
      teapot.rotation.x = -Math.PI / 2;
      teapot.position.y = -1;
      scene.add(teapot);
    }

    createTeapot(10);

    const slider = document.getElementById('tessSlider');
    const valueSpan = document.getElementById('levelVal');

    slider.addEventListener('input', (e) => {
      const level = parseInt(e.target.value);
      valueSpan.textContent = level;
      createTeapot(level);
      renderer.render(scene, camera);  // force redraw
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      if (teapot) teapot.rotation.y += 0.004;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
