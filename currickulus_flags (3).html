<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Painter's Flags • Chaos Game on Invisible Conic Section</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: system-ui, sans-serif;
            background: rgba(0,0,0,0.6);
            padding: 10px 14px;
            border-radius: 6px;
            pointer-events: none;
            font-size: 14px;
            z-index: 100;
        }
    </style>
</head>
<body>
<div id="info">Painter’s Flags • Chaos-Game Plastered on Invisible Conic Section • Multicolored &amp; Translucent • Drag to rotate • Scroll to zoom</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script>
    // =============== Painter's Flags • Chaos Game on Invisible Conic Section ===============
    // ✅ Cone is 100% invisible (no wireframe, no mesh)
    // ✅ Flags are “plastered” tangent to the cone surface
    // ✅ Positions generated via chaos-game-style distribution (power-law descent + golden-angle spiral + heavy jitter) for irregular fractal-like chaos descending from the apex
    // ✅ Multicolored, translucent, painterly waving flags
    // ✅ Fully interactive (OrbitControls)

    let scene, camera, renderer, controls, clock;
    let flags = [];

    const CONE_HEIGHT = 18;
    const BASE_RADIUS = 8.5;
    const APEX_Y = 10;
    const TOTAL_FLAGS = 165;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1f);

        camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4, 24);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        clock = new THREE.Clock();

        // Soft painterly lighting
        scene.add(new THREE.AmbientLight(0x99aaff, 0.7));
        const light1 = new THREE.DirectionalLight(0xffeecc, 1.3);
        light1.position.set(15, 20, 10);
        scene.add(light1);
        const light2 = new THREE.DirectionalLight(0xaaffff, 0.9);
        light2.position.set(-18, 12, -12);
        scene.add(light2);

        // Custom shader – waving translucent painterly flags
        const vertexShader = `
            uniform float time;
            varying vec2 vUv;
            void main() {
                vUv = uv;
                vec3 pos = position;
                float wave = sin(time * 3.2 + pos.x * 4.5) * 0.28 * uv.x;
                pos.z += wave;
                pos.y += sin(time * 2.8 + pos.x * 3.0) * 0.07;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const fragmentShader = `
            uniform vec3 flagColor;
            varying vec2 vUv;
            void main() {
                vec3 col = flagColor;
                // Painterly brush-stroke stripes
                float stripe = sin(vUv.x * 32.0) * 0.15 + sin(vUv.y * 18.0) * 0.1;
                col = mix(col, col * 1.3, stripe);
                gl_FragColor = vec4(col, 0.76); // translucent
            }
        `;

        const flagWidth = 2.1;
        const flagHeight = 1.35;
        const golden = 2.399963; // golden-angle spiral for chaotic angular distribution

        // Chaos-game-style placement on invisible cone
        for (let i = 0; i < TOTAL_FLAGS; i++) {
            // Power-law progress → irregular “descending” density (classic chaos-game bias)
            let progress = Math.pow(Math.random(), 0.68);
            let y = APEX_Y - progress * CONE_HEIGHT;

            let nominalRadius = progress * BASE_RADIUS;
            // Extra radius chaos/jitter for fractal-like scatter
            let radius = nominalRadius * (0.75 + 0.55 * Math.random());

            // Chaotic angle: golden spiral + heavy noise
            let theta = i * golden + Math.random() * 5.5 + progress * 3.0;

            let x = radius * Math.cos(theta);
            let z = radius * Math.sin(theta);

            const geometry = new THREE.PlaneGeometry(flagWidth, flagHeight, 20, 9);

            // Vibrant multicolored painterly hues
            const hue = (i * 0.037 + progress * 0.6) % 1.0;
            const color = new THREE.Color().setHSL(hue, 0.95, 0.58 + Math.random() * 0.15);

            const material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    flagColor: { value: color }
                },
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false
            });

            const flag = new THREE.Mesh(geometry, material);
            flag.position.set(x, y, z);

            // Plaster flag perfectly tangent to the (invisible) conic surface
            const outward = new THREE.Vector3(x, 0, z).normalize();
            flag.lookAt(flag.position.clone().add(outward.multiplyScalar(30)));
            flag.rotateY(Math.PI * 0.5);

            // Slight random scale variation (smaller near apex)
            const scale = 0.75 + Math.random() * 0.55;
            flag.scale.set(scale, scale * 0.9, 1);

            scene.add(flag);
            flags.push(flag);
        }

        // Interactive orbit controls
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;
        controls.minDistance = 9;
        controls.maxDistance = 45;
        controls.target.set(0, 2, 0);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        // Animate waving on every flag
        for (let flag of flags) {
            flag.material.uniforms.time.value = t + flag.position.x * 0.1;
        }

        controls.update();
        renderer.render(scene, camera);
    }

    init();
    animate();
</script>
</body>
</html>
