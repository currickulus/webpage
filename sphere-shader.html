<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Thessalated Shaded Sphere</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #controls {
    position: absolute; top: 16px; left: 16px;
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    padding: 14px 18px; border-radius: 10px;
    color: #ccc; font-size: 13px; line-height: 2;
    min-width: 220px;
  }
  #controls label { display: flex; align-items: center; gap: 10px; color: #aaa; }
  #controls input[type=range] {
    flex: 1; accent-color: #88aaff;
    height: 4px; cursor: pointer;
  }
  #levelVal {
    color: #88aaff; font-weight: bold;
    min-width: 14px; text-align: right;
  }
  #controls small { color: #555; font-size: 11px; line-height: 1.5; display: block; margin-top: 4px; }

  #texSelect {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: #ccc; border-radius: 5px;
    padding: 3px 6px; font-size: 12px;
    font-family: inherit; cursor: pointer; width: 100%;
  }
  #texSelect option { background: #111; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  .lbl { color: #777; font-size: 11px; width: 90px; flex-shrink: 0; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="controls">
  <div class="row">
    <span class="lbl">Subdivisions</span>
    <label style="flex:1">
      <input type="range" id="level" min="0" max="6" value="4">
      <span id="levelVal">4</span>
    </label>
  </div>
 
<script>
//  MATH HELPERS
function vec4(x,y,z,w=1){ return [x,y,z,w]; }
function add3(a,b){ return [a[0]+b[0], a[1]+b[1], a[2]+b[2]]; }
function sub3(a,b){ return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
function scale3(a,s){ return [a[0]*s, a[1]*s, a[2]*s]; }
function dot3(a,b){ return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function cross3(a,b){
  return [ a[1]*b[2]-a[2]*b[1],
           a[2]*b[0]-a[0]*b[2],
           a[0]*b[1]-a[1]*b[0] ];
}
function len3(v){ return Math.hypot(v[0],v[1],v[2]); }
function norm3(v){ let l=len3(v); return l?[v[0]/l,v[1]/l,v[2]/l]:[0,0,0]; }
function norm4(v){ let l=len3(v); return l?[v[0]/l,v[1]/l,v[2]/l,1]:[0,0,0,1]; }

function lookAt(eye, at, up){
  let z = norm3(sub3(eye, at));
  let x = norm3(cross3(up, z));
  let y = cross3(z, x);
  return new Float32Array([
    x[0], y[0], z[0], 0,
    x[1], y[1], z[1], 0,
    x[2], y[2], z[2], 0,
    -dot3(x,eye), -dot3(y,eye), -dot3(z,eye), 1
  ]);
}

function perspective(fovy, aspect, near, far){
  let f = 1/Math.tan(fovy/2), nf = 1/(near-far);
  return new Float32Array([
    f/aspect, 0, 0, 0,
    0, f, 0, 0,
    0, 0, (far+near)*nf, -1,
    0, 0, 2*far*near*nf, 0
  ]);
}

//  WEBGL SETUP
const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl');
if (!gl) { alert("WebGL not supported"); }

function resize(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

gl.clearColor(0.05, 0.05, 0.08, 1);
gl.enable(gl.DEPTH_TEST);

//  SHADERS
const vsSource = `
  attribute vec4  aPosition;
  attribute vec3  aNormal;
  attribute vec2  aTexCoord;

  uniform mat4    uMV;
  uniform mat4    uP;
  uniform mat3    uNormalMat;

  varying vec3    vNormal;
  varying vec3    vEyePos;
  varying vec2    vTexCoord;

  void main(){
    vec4 ep   = uMV * aPosition;
    vEyePos   = ep.xyz;
    vNormal   = normalize(uNormalMat * aNormal);
    vTexCoord = aTexCoord;
    gl_Position = uP * ep;
  }
`;

const fsSource = `
  precision mediump float;

  varying vec3 vNormal;
  varying vec3 vEyePos;
  varying vec2 vTexCoord;

  uniform sampler2D uTexture;
  uniform vec3  uLightDir;   // in eye-space, normalised
  uniform vec3  uAmbient;
  uniform vec3  uDiffuse;
  uniform vec3  uSpecular;
  uniform float uShininess;

  void main(){
    vec3 N = normalize(vNormal);
    vec3 L = normalize(uLightDir);
    vec3 E = normalize(-vEyePos);
    vec3 H = normalize(L + E);

    float diff = max(dot(N, L), 0.0);
    float spec = pow(max(dot(N, H), 0.0), uShininess);

    vec3 texColor = texture2D(uTexture, vTexCoord).rgb;
    vec3 color = (uAmbient + diff * uDiffuse) * texColor
               + spec * uSpecular;
    gl_FragColor = vec4(color, 1.0);
  }
`;

function compileShader(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    throw new Error("Shader compile error:\n" + gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER,   vsSource));
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, fsSource));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
  throw new Error("Program link error:\n" + gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const loc = {
  pos:      gl.getAttribLocation(prog,  "aPosition"),
  norm:     gl.getAttribLocation(prog,  "aNormal"),
  tex:      gl.getAttribLocation(prog,  "aTexCoord"),
  MV:       gl.getUniformLocation(prog, "uMV"),
  P:        gl.getUniformLocation(prog, "uP"),
  NM:       gl.getUniformLocation(prog, "uNormalMat"),
  light:    gl.getUniformLocation(prog, "uLightDir"),
  ambient:  gl.getUniformLocation(prog, "uAmbient"),
  diffuse:  gl.getUniformLocation(prog, "uDiffuse"),
  specular: gl.getUniformLocation(prog, "uSpecular"),
  shininess:gl.getUniformLocation(prog, "uShininess"),
  texture:  gl.getUniformLocation(prog, "uTexture"),
};

//  SPHERE GEOMETRY  (recursive subdivision of tetrahedron)
let positions = [], normals = [], texcoords = [];
let vertCount = 0;

// Starting tetrahedron vertices (unit sphere)
const VA = vec4( 0.000000,  0.000000, -1.000000);
const VB = vec4( 0.000000,  0.942809,  0.333333);
const VC = vec4(-0.816497, -0.471405,  0.333333);
const VD = vec4( 0.816497, -0.471405,  0.333333);

function midpoint(a, b){
  // Midpoint on unit sphere — normalise after averaging
  return norm4([(a[0]+b[0])/2, (a[1]+b[1])/2, (a[2]+b[2])/2]);
}

function sphericalUV(p){
  // Correct spherical mapping
  let u = 0.5 + Math.atan2(p[2], p[0]) / (2*Math.PI);
  let v = 0.5 - Math.asin(Math.max(-1, Math.min(1, p[1]))) / Math.PI;
  return [u, v];
}

function emitTriangle(a, b, c){
  [a, b, c].forEach(p => {
    positions.push(p[0], p[1], p[2]);
    normals.push(p[0], p[1], p[2]);   // unit sphere: normal = position
    let uv = sphericalUV(p);
    texcoords.push(uv[0], uv[1]);
  });
  vertCount += 3;
}

function divideTriangle(a, b, c, depth){
  if (depth === 0){
    emitTriangle(a, b, c);
    return;
  }
  let ab = midpoint(a, b);
  let bc = midpoint(b, c);
  let ca = midpoint(c, a);
  divideTriangle(a,  ab, ca, depth-1);
  divideTriangle(ab,  b, bc, depth-1);
  divideTriangle(ca, bc,  c, depth-1);
  divideTriangle(ab, bc, ca, depth-1);
}

function generateSphere(level){
  positions = []; normals = []; texcoords = [];
  vertCount = 0;
  divideTriangle(VA, VB, VC, level);
  divideTriangle(VD, VC, VB, level);
  divideTriangle(VA, VD, VB, level);
  divideTriangle(VA, VC, VD, level);
}

//  GPU BUFFERS
const posBuf  = gl.createBuffer();
const normBuf = gl.createBuffer();
const texBuf  = gl.createBuffer();

function uploadBuffers(){
  gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER, normBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(normals), gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER, texBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(texcoords), gl.STATIC_DRAW);
}

// Texture
const activeTexture = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, activeTexture);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);

// Grey placeholder so ball shows immediately
gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE,
              new Uint8Array([128, 128, 128, 255]));

const venusImg = new Image();
venusImg.src = "2k_venus_atmosphere.jpg";
venusImg.onload = () => {
  gl.bindTexture(gl.TEXTURE_2D, activeTexture);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, venusImg);
  gl.generateMipmap(gl.TEXTURE_2D);
};//  LIGHTING PRESETS  (change with texture)
const lightPresets = {
  marble: { ambient:[0.25,0.25,0.28], diffuse:[0.8,0.78,0.85], specular:[1.2,1.2,1.2], shininess:120 },
  earth:  { ambient:[0.15,0.18,0.20], diffuse:[0.9,0.88,0.80], specular:[0.3,0.3,0.3],  shininess:20  },
  lava:   { ambient:[0.3,0.05,0.0],   diffuse:[1.0,0.5,0.1],   specular:[1.0,0.8,0.2],  shininess:60  },
  ice:    { ambient:[0.2,0.25,0.35],  diffuse:[0.7,0.85,1.0],  specular:[1.5,1.5,1.5],  shininess:200 },
};

function applyLighting(name){
  const p = lightPresets[name];
  gl.uniform3fv(loc.ambient,  p.ambient);
  gl.uniform3fv(loc.diffuse,  p.diffuse);
  gl.uniform3fv(loc.specular, p.specular);
  gl.uniform1f(loc.shininess, p.shininess);
}

// Initial lighting (light direction in eye-space — set once, stays fixed rel. camera)
gl.uniform3f(loc.light, 0.6, 1.0, 0.8);   // upper-right key light
applyLighting('marble');

//  NORMAL MATRIX HELPER  (3×3 inverse-transpose of upper-left MV)
function normalMatrix(mv){
  // Extract upper-left 3×3 (column-major Float32Array)
  let m = mv;
  let a=m[0],b=m[1],c=m[2], d=m[4],e=m[5],f=m[6], g=m[8],h=m[9],k=m[10];
  let det = a*(e*k-f*h) - d*(b*k-c*h) + g*(b*f-c*e);
  if(!det) return new Float32Array([1,0,0, 0,1,0, 0,0,1]);
  let inv = 1/det;
  // Adjugate transposed (i.e. inverse-transpose)
  return new Float32Array([
    (e*k-f*h)*inv, (g*f-d*k)*inv, (d*h-g*e)*inv,
    (h*c-k*b)*inv, (a*k-g*c)*inv, (b*g-a*h)*inv,
    (b*f-e*c)*inv, (c*d-a*f)*inv, (a*e-b*d)*inv
  ]);
}

//  INTERACTION  (drag to rotate, scroll to zoom)
let autoTheta = 0;
let userTheta = 0, userPhi = 0.4;
let zoom = 3.5;
let dragging = false, lastX, lastY;

canvas.addEventListener('mousedown', e => { dragging=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mouseup',   ()=> dragging=false);
window.addEventListener('mousemove', e => {
  if(!dragging) return;
  let dx=e.clientX-lastX, dy=e.clientY-lastY;
  userTheta += dx * 0.008;
  userPhi   = Math.max(-1.4, Math.min(1.4, userPhi - dy*0.008));
  lastX=e.clientX; lastY=e.clientY;
});
canvas.addEventListener('wheel', e => {
  zoom = Math.max(1.5, Math.min(8, zoom + e.deltaY*0.005));
  e.preventDefault();
}, {passive:false});

// Touch support
let lastTouchX, lastTouchY;
canvas.addEventListener('touchstart', e => { dragging=true; lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY; });
canvas.addEventListener('touchend',   ()=> dragging=false);
canvas.addEventListener('touchmove',  e => {
  if(!dragging) return;
  let dx=e.touches[0].clientX-lastTouchX, dy=e.touches[0].clientY-lastTouchY;
  userTheta+=dx*0.01; userPhi=Math.max(-1.4,Math.min(1.4,userPhi-dy*0.01));
  lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY;
  e.preventDefault();
},{passive:false});

//  CONTROLS
const slider  = document.getElementById('level');
const levelV  = document.getElementById('levelVal');

function rebuild(){
  const lev = parseInt(slider.value);
  levelV.textContent = lev;
  generateSphere(lev);
  uploadBuffers();
}

slider.addEventListener('input', rebuild);
rebuild(); // initial build


//  RENDER LOOP
function render(){
  autoTheta += 0.003;
  let theta = autoTheta + userTheta;
  let phi   = userPhi;

  let r   = zoom;
  let eye = [
    r * Math.cos(phi) * Math.sin(theta),
    r * Math.sin(phi),
    r * Math.cos(phi) * Math.cos(theta)
  ];

  const mv = lookAt(eye, [0,0,0], [0,1,0]);
  const p  = perspective(Math.PI/3.5, canvas.width/canvas.height, 0.1, 100);
  const nm = normalMatrix(mv);

  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  gl.uniformMatrix4fv(loc.MV, false, mv);
  gl.uniformMatrix4fv(loc.P,  false, p);
  gl.uniformMatrix3fv(loc.NM, false, nm);

  // Position
  gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
  gl.vertexAttribPointer(loc.pos, 3, gl.FLOAT, false, 0, 0);
  gl.enableVertexAttribArray(loc.pos);

  // Normal
  gl.bindBuffer(gl.ARRAY_BUFFER, normBuf);
  gl.vertexAttribPointer(loc.norm, 3, gl.FLOAT, false, 0, 0);
  gl.enableVertexAttribArray(loc.norm);

  // TexCoord
  gl.bindBuffer(gl.ARRAY_BUFFER, texBuf);
  gl.vertexAttribPointer(loc.tex, 2, gl.FLOAT, false, 0, 0);
  gl.enableVertexAttribArray(loc.tex);

  // Texture
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, activeTexture);
  gl.uniform1i(loc.texture, 0);

  gl.drawArrays(gl.TRIANGLES, 0, vertCount);
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
