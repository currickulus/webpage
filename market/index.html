<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CURRICKULUS MARKET SUITE</title>
<style>
  body { background:#080c10; color:#c8d8e8; font-family:'Share Tech Mono', monospace; margin:0; padding:0; }
  header { padding:15px 20px; background:#0a1520; border-bottom:1px solid #1e2d3d; display:flex; justify-content:space-between; align-items:center; }
  .logo { font-family:'Orbitron'; font-size:20px; font-weight:900; color:#00d4ff; }
  .live { color:#00ff88; }
  #ticker { background:#111820; padding:8px 20px; font-size:13px; overflow:hidden; white-space:nowrap; border-bottom:1px solid #1e2d3d; }
  .main { display:grid; grid-template-columns:380px 1fr; gap:20px; padding:20px; height:calc(100vh - 120px); }
  .panel { background:#0d1117; border:1px solid #1e2d3d; border-radius:4px; overflow:hidden; }
  .panel-header { padding:10px 14px; background:#111820; font-size:11px; letter-spacing:1px; color:#00d4ff; }
  .indicator-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:12px; }
  .ind-block {
    border:1px solid #1e2d3d; border-radius:4px; padding:10px; display:flex; align-items:center; gap:10px;
  }
  .ind-sq { width:16px; height:16px; border-radius:3px; }
  .bull .ind-sq { background:#00ff88; box-shadow:0 0 10px #00ff88; }
  .bear .ind-sq { background:#ff3355; box-shadow:0 0 10px #ff3355; }
  .neutral .ind-sq { background:#ffd700; }
  .big-price { font-size:80px; font-weight:bold; color:#00ff88; text-align:center; padding:40px 20px; }
</style>
</head>
<body>

<header>
  <div class="logo">CURRICKULUS MARKET SUITE</div>
  <div><span class="live">● LIVE</span> <span id="time"></span></div>
</header>

<div id="ticker"></div>

<div class="main">
  <div class="panel">
    <div class="panel-header">SIGNAL TREE — MYMU26</div>
    <div class="indicator-grid" id="tree"></div>
  </div>

  <div class="panel">
    <div class="panel-header">PRICE CHART — MYMU26</div>
    <div style="height:500px; padding:10px;">
      <canvas id="chart"></canvas>
    </div>
    <div class="big-price" id="bigprice">---</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
let chartInst = null;

async function update() {
  try {
    const res = await fetch('/bars');
    const bars = await res.json();
    if (!bars || bars.length < 5) return;

    const last = bars[bars.length-1];
    const prev = bars[bars.length-2];
    const change = last.c - prev.c;

    // Fixed local time
    const now = new Date();
    document.getElementById('time').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});

    // Big price
    document.getElementById('bigprice').textContent = last.c.toFixed(0);

    // Ticker
    document.getElementById('ticker').innerHTML = `MYMU26 <span style="color:${change>=0?'#00ff88':'#ff3355'}">${last.c.toFixed(0)} ${change>=0?'▲':'▼'}${(change/prev.c*100).toFixed(2)}%</span>`;

    // Simple Signal Tree (you can expand this later)
    const html = `
      <div class="ind-block ${change>=0?'bull':'bear'}"><div class="ind-sq"></div><div class="ind-label">PRICE</div><div class="ind-val">${last.c.toFixed(0)}</div></div>
      <div class="ind-block ${change>=0?'bull':'bear'}"><div class="ind-sq"></div><div class="ind-label">DIRECTION</div><div class="ind-val">${change>=0?'↑ BULLISH':'↓ BEARISH'}</div></div>
      <div class="ind-block neutral"><div class="ind-sq"></div><div class="ind-label">MOMENTUM</div><div class="ind-val">WAITING</div></div>
      <div class="ind-block neutral"><div class="ind-sq"></div><div class="ind-label">VOLUME</div><div class="ind-val">${last.v}</div></div>
      <div class="ind-block neutral"><div class="ind-sq"></div><div class="ind-label">RSI</div><div class="ind-val">50</div></div>
      <div class="ind-block neutral"><div class="ind-sq"></div><div class="ind-label">ATR</div><div class="ind-val">25</div></div>
      <div class="ind-block neutral"><div class="ind-sq"></div><div class="ind-label">MACD</div><div class="ind-val">—</div></div>
      <div class="ind-block neutral"><div class="ind-sq"></div><div class="ind-label">EMA CROSS</div><div class="ind-val">NO CROSS</div></div>
    `;
    document.getElementById('tree').innerHTML = html;

    // Simple chart
    if (chartInst) chartInst.destroy();
    const ctx = document.getElementById('chart').getContext('2d');
    chartInst = new Chart(ctx, {
      type: 'line',
      data: {
        labels: bars.slice(-60).map(b => ''),
        datasets: [{
          data: bars.slice(-60).map(b => b.c),
          borderColor: '#00d4ff',
          borderWidth: 2,
          tension: 0.2,
          pointRadius: 0
        }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}} }
    });
  } catch(e) {
    console.error(e);
  }
}

setInterval(update, 3000);
update();
</script>
</body>
</html>
