<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Currickulus Flags</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 14);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.0));

// ── Logo mesh builder ──────────────────────────────────
function buildLogoMesh(color) {
  const mat   = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide });
  const group = new THREE.Group();

  function mesh(geo) { return new THREE.Mesh(geo, mat); }

  // Central orb
  group.add(mesh(new THREE.CircleGeometry(0.38, 48)));

  // Top spike (downward-pointing arrow into orb)
  const stg = new THREE.BufferGeometry();
  stg.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
     0,    0.36, 0,
    -0.06, 0.60, 0,
     0,    0.95, 0,
     0.06, 0.60, 0,
  ]), 3));
  stg.setIndex([0,1,2, 0,2,3]);
  stg.computeVertexNormals();
  group.add(mesh(stg));

  // Bottom spike
  const sbg = new THREE.BufferGeometry();
  sbg.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
     0,   -0.36, 0,
     0.06,-0.60, 0,
     0,   -0.95, 0,
    -0.06,-0.60, 0,
  ]), 3));
  sbg.setIndex([0,1,2, 0,2,3]);
  sbg.computeVertexNormals();
  group.add(mesh(sbg));

  // Left wing (swept, 3 feather cuts)
  const wlg = new THREE.BufferGeometry();
  wlg.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
    -0.36,  0.22, 0,
    -0.58,  0.48, 0,
    -0.80,  0.55, 0,
    -1.10,  0.32, 0,
    -1.20,  0.05, 0,
    -1.05, -0.08, 0,
    -0.75, -0.12, 0,
    -0.50, -0.06, 0,
    -0.36, -0.18, 0,
    // feather notch cuts (indentations along top edge)
    -0.66,  0.38, 0,
    -0.90,  0.42, 0,
  ]), 3));
  wlg.setIndex([
    0,1,7, 1,6,7, 1,9,6, 9,5,6, 1,2,9, 2,10,9, 2,3,10, 3,4,10, 4,5,10,
    0,7,8,
  ]);
  wlg.computeVertexNormals();
  group.add(mesh(wlg));

  // Right wing (mirror)
  const wrg = new THREE.BufferGeometry();
  wrg.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
     0.36,  0.22, 0,
     0.58,  0.48, 0,
     0.80,  0.55, 0,
     1.10,  0.32, 0,
     1.20,  0.05, 0,
     1.05, -0.08, 0,
     0.75, -0.12, 0,
     0.50, -0.06, 0,
     0.36, -0.18, 0,
     0.66,  0.38, 0,
     0.90,  0.42, 0,
  ]), 3));
  wrg.setIndex([
    0,7,1, 1,7,6, 1,6,9, 9,6,5, 1,9,2, 2,9,10, 2,10,3, 3,10,4, 4,10,5,
    0,8,7,
  ]);
  wrg.computeVertexNormals();
  group.add(mesh(wrg));

  // Talons — 4 curved claws, 2 per side
  function talon(x, y, flipX) {
    const f = flipX ? -1 : 1;
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
      x*f,        y,       0,
      (x+0.04)*f, y-0.14,  0,
      (x+0.18)*f, y-0.42,  0,
      (x+0.30)*f, y-0.58,  0,
      (x+0.20)*f, y-0.50,  0,
      (x+0.08)*f, y-0.26,  0,
      (x-0.04)*f, y-0.10,  0,
    ]), 3));
    const idx = flipX
      ? [0,6,1, 1,6,5, 1,5,2, 2,5,4, 2,4,3]
      : [0,1,6, 1,5,6, 1,2,5, 2,4,5, 2,3,4];
    g.setIndex(idx);
    g.computeVertexNormals();
    return g;
  }

  group.add(mesh(talon(0.20, -0.34, false)));
  group.add(mesh(talon(0.20, -0.34, true)));
  group.add(mesh(talon(0.42, -0.26, false)));
  group.add(mesh(talon(0.42, -0.26, true)));

  return group;
}

// ── Spawn flags ───────────────────────────────────────
const FLAG_COLORS  = [0xff2200, 0x00ccff, 0xffcc00, 0xff00bb, 0x33ff99, 0xff6600];
const FLAG_COUNT   = 10;
const FLAG_RADIUS  = 8;
const flags        = [];

for (let i = 0; i < FLAG_COUNT; i++) {
  const color = FLAG_COLORS[i % FLAG_COLORS.length];
  const logo  = buildLogoMesh(color);
  const angle = (i / FLAG_COUNT) * Math.PI * 2;
  logo.position.set(
    Math.cos(angle) * FLAG_RADIUS,
    Math.sin(i * 1.7) * 1.5,
    Math.sin(angle) * FLAG_RADIUS
  );
  logo.userData.angle = angle;
  logo.userData.speed = 0.0002 + Math.random() * 0.0003;
  logo.userData.bob   = Math.random() * Math.PI * 2;
  scene.add(logo);
  flags.push(logo);
}

// ── Painter's sort ────────────────────────────────────
function sortFlags() {
  flags.sort((a,b) =>
    b.position.distanceToSquared(camera.position) -
    a.position.distanceToSquared(camera.position)
  );
  flags.forEach(f => scene.add(f));
}

// ── Camera slow orbit ─────────────────────────────────
let camAngle = 0;

function animate(t) {
  requestAnimationFrame(animate);
  camAngle += 0.0001 * 16;
  camera.position.set(
    Math.cos(camAngle) * 14,
    3 + Math.sin(camAngle * 0.4) * 2,
    Math.sin(camAngle) * 14
  );
  camera.lookAt(0, 0, 0);

  for (const f of flags) {
    f.userData.angle += f.userData.speed * 16;
    const a = f.userData.angle;
    f.position.set(
      Math.cos(a) * FLAG_RADIUS,
      Math.sin(f.userData.bob + t * 0.001) * 1.5,
      Math.sin(a) * FLAG_RADIUS
    );
    f.lookAt(camera.position);
  }

  sortFlags();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate(0);
</script>
</body>
</html>
