<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currickulus Logo Flags • Clean Cone • Painter’s Algorithm</title>
    <style>
        body { margin:0; overflow:hidden; background:#000; }
        canvas { display:block; }
        #info {
            position:absolute; top:10px; left:10px; color:#fff; font-family:system-ui;
            background:rgba(0,0,0,0.7); padding:12px 16px; border-radius:8px; pointer-events:none;
            max-width:460px; line-height:1.45;
        }
    </style>
</head>
<body>
<div id="info">
    <strong>Currickulus Logo Flags</strong><br>
    Painter’s Algorithm (back-to-front sorting) • 100% Invisible Conic Section<br>
    Flags now orbit + descend on a <strong>perfect clean cone</strong> • Multicolored translucent<br>
    Strictly coplanar &amp; tangent • Gentle breathing only (no plane tilt)<br>
    Drag to rotate • Scroll to zoom
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script>
// =============== Currickulus Moving Logo Flags – FIXED ===============
// Explanation of the two issues you saw in the previous version:
//
// 1. “Intersecting in the middle → 3D figure eight instead of cone”
//    → Caused by this line:
//       const r = logo.userData.progress * BASE_RADIUS * (0.72 + 0.55 * Math.sin(logo.userData.progress * 8));
//    The sine wave made every flag’s radius pulse in and out while descending.
//    When flags at different heights had overlapping radii they crossed paths,
//    creating the hourglass / figure-8 illusion.
//
// 2. “Flags aren’t staying coplanar to the cone”
//    → Caused by the extra wave tilt on the up-vector:
//       trueUp.y += wave * 0.6; trueUp.normalize();
//    This deliberately rocked the entire flag plane away from the exact tangent.
//    Even a tiny change breaks perfect coplanarity.
//
// This version fixes both:
// • Radius is now strictly linear → perfect clean cone shape
// • Orientation uses exact tangent basis with zero extra tilt
// • Gentle “breathing” scale remains for a living painterly feel
// • Flags still slowly orbit + descend continuously

let scene, camera, renderer, controls, clock;
let flags = [];

const CONE_HEIGHT = 17.5;
const BASE_RADIUS = 8.4;
const APEX_Y = 9.8;
const TOTAL_FLAGS = 52;

function buildCurrickulusLogo(color) {
    const group = new THREE.Group();
    const mat = new THREE.MeshBasicMaterial({
        color: color,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.74,
        depthWrite: false
    });

    // Central orb
    group.add(new THREE.Mesh(new THREE.CircleGeometry(0.38, 48), mat));

    // Top spike
    const topGeo = new THREE.BufferGeometry();
    topGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
        -0.06, 0.37, 0,  0.06, 0.37, 0,  0, 0.94, 0
    ]), 3));
    topGeo.setIndex([0,1,2]);
    topGeo.computeVertexNormals();
    group.add(new THREE.Mesh(topGeo, mat));

    // Bottom spike
    const botGeo = new THREE.BufferGeometry();
    botGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
        -0.06, -0.37, 0,  0.06, -0.37, 0,  0, -0.94, 0
    ]), 3));
    botGeo.setIndex([0,1,2]);
    botGeo.computeVertexNormals();
    group.add(new THREE.Mesh(botGeo, mat));

    // Swept wings
    const wingGeo = new THREE.BufferGeometry();
    wingGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
        -0.35,0.20,0, -0.82,0.48,0, -1.18,0.15,0, -1.32,-0.12,0, -0.98,-0.22,0, -0.52,-0.10,0
    ]), 3));
    wingGeo.setIndex([0,1,2, 0,2,3, 0,3,4, 0,4,5]);
    wingGeo.computeVertexNormals();
    const leftWing = new THREE.Mesh(wingGeo, mat);
    const rightWing = leftWing.clone();
    rightWing.scale.x = -1;
    group.add(leftWing);
    group.add(rightWing);

    // Talons
    function addTalon(x, y) {
        const tGeo = new THREE.BufferGeometry();
        tGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
            x, y, 0,  x+0.14, y-0.24, 0,  x+0.29, y-0.45, 0
        ]), 3));
        tGeo.setIndex([0,1,2]);
        tGeo.computeVertexNormals();
        group.add(new THREE.Mesh(tGeo, mat));
    }
    addTalon(0.24, -0.36);
    addTalon(0.45, -0.33);
    addTalon(-0.24, -0.36);
    addTalon(-0.45, -0.33);

    group.scale.set(1.4, 1.4, 1.0);
    return group;
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1f);

    camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(0, 6, 23);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    scene.add(new THREE.AmbientLight(0x99aaff, 0.75));
    const dl1 = new THREE.DirectionalLight(0xffeecc, 1.2);
    dl1.position.set(12, 20, 10);
    scene.add(dl1);
    const dl2 = new THREE.DirectionalLight(0xaaffff, 0.9);
    dl2.position.set(-15, 14, -12);
    scene.add(dl2);

    const colors = [0xff3366, 0x00ddff, 0xffee33, 0xcc44ff, 0x44ffaa, 0xffaa22];

    for (let i = 0; i < TOTAL_FLAGS; i++) {
        const color = colors[i % colors.length];
        const logo = buildCurrickulusLogo(color);

        const progress = Math.pow(Math.random(), 0.62);
        const y = APEX_Y - progress * CONE_HEIGHT;
        const radius = progress * BASE_RADIUS;
        const angle = i * 2.399963 + Math.random() * 7.5;

        logo.position.set(radius * Math.cos(angle), y, radius * Math.sin(angle));

        logo.userData = {
            angle: angle,
            progress: progress,
            speed: 0.00022 + Math.random() * 0.00014,
            waveOffset: Math.random() * Math.PI * 2
        };

        scene.add(logo);
        flags.push(logo);
    }

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.11;
    controls.minDistance = 11;
    controls.maxDistance = 42;
    controls.target.set(0, 4, 0);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

function applyPaintersAlgorithm() {
    const camPos = camera.position;
    flags.sort((a, b) => {
        const da = a.position.distanceToSquared(camPos);
        const db = b.position.distanceToSquared(camPos);
        return db - da;
    });
    for (let i = 0; i < flags.length; i++) {
        flags[i].renderOrder = i;
    }
}

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    for (let logo of flags) {
        // === Clean cone movement (no radius jitter) ===
        logo.userData.angle += logo.userData.speed * 38;
        logo.userData.progress = Math.min(1.0, logo.userData.progress + logo.userData.speed * 8);

        if (logo.userData.progress >= 0.99) {
            logo.userData.progress = 0.02;
            logo.userData.angle += Math.random() * 12;
        }

        const r = logo.userData.progress * BASE_RADIUS;          // ← STRICT LINEAR (clean cone)
        const y = APEX_Y - logo.userData.progress * CONE_HEIGHT;

        logo.position.set(
            r * Math.cos(logo.userData.angle),
            y,
            r * Math.sin(logo.userData.angle)
        );

        // === Perfect tangent orientation (strictly coplanar) ===
        const radial = new THREE.Vector3(logo.position.x, 0, logo.position.z).normalize();
        const slope = Math.atan2(BASE_RADIUS, CONE_HEIGHT) * 0.68;

        const normal = new THREE.Vector3(
            radial.x * Math.cos(slope),
            Math.sin(slope) * 0.96,
            radial.z * Math.cos(slope)
        ).normalize();

        const up = new THREE.Vector3(0, 1, 0);
        const right = new THREE.Vector3().crossVectors(up, normal).normalize();
        const trueUp = new THREE.Vector3().crossVectors(normal, right).normalize();   // ← NO wave tilt

        logo.matrix.makeBasis(right, trueUp, normal);
        logo.matrix.setPosition(logo.position);
        logo.matrixAutoUpdate = false;
        logo.matrixWorldNeedsUpdate = true;

        // Gentle breathing only (no plane distortion)
        const breathe = 1 + Math.sin(t * 2.8 + logo.userData.waveOffset) * 0.018;
        logo.scale.setScalar(breathe);
    }

    applyPaintersAlgorithm();
    controls.update();
    renderer.render(scene, camera);
}

init();
animate();
</script>
</body>
</html>
