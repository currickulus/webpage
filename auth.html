<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currickulus - Auth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #00ff00;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
    }
    .box {
      border: 1px solid #00ff00;
      padding: 40px 60px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    h1 { font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 24px; }
    .status { font-size: 13px; letter-spacing: 0.1em; color: #888; margin-bottom: 16px; }
    .status.success { color: #00ff00; }
    .status.error { color: #ff3333; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #333;
      border-top-color: #00ff00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Device Authorization</h1>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Verifying token...</div>
  </div>
  <script>
    const status  = document.getElementById('status');
    const spinner = document.getElementById('spinner');
    function setStatus(msg, type) {
      status.textContent = msg;
      status.className = 'status ' + type;
    }
    async function authorize() {
      const params = new URLSearchParams(window.location.search);
      const token  = params.get('token');
      if (!token) {
        spinner.classList.add('hidden');
        setStatus('No token found. Scan the QR code to authorize this device.', 'error');
        return;
      }
      try {
        const res = await fetch('/api/verify', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) {
          localStorage.setItem('token', token);
          setStatus('Device authorized. Redirecting...', 'success');
          spinner.classList.add('hidden');
          setTimeout(() => { window.location.href = '/'; }, 1200);
        } else {
          spinner.classList.add('hidden');
          setStatus('Invalid or expired token.', 'error');
        }
      } catch (err) {
        spinner.classList.add('hidden');
        setStatus('Could not reach server.', 'error');
      }
    }
    authorize();
  </script>
</body>
</html>
