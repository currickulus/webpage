<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currickulus Butterfly Volcano • Painter’s Algorithm</title>
    <style>
        body { margin:0; overflow:hidden; background:#000; }
        canvas { display:block; }
        #info {
            position:absolute; top:10px; left:10px; color:#fff; font-family:system-ui;
            background:rgba(0,0,0,0.75); padding:12px 16px; border-radius:8px; pointer-events:none;
            max-width:460px; line-height:1.45;
        }
    </style>
</head>
<body>
<div id="info">
    <strong>Butterfly Volcano</strong><br>
    Currickulus Logo Flags • Painter’s Algorithm • Invisible Conic Section<br>
    Erupting / descending flow with spreading wings • Multicolored translucent<br>
    Drag to rotate • Scroll to zoom
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script>
// =============== Butterfly Volcano – Currickulus Flags ===============

let scene, camera, renderer, controls, clock;
let flags = [];

const CONE_HEIGHT = 18;
const BASE_RADIUS = 9.2;
const APEX_Y = 10.2;
const TOTAL_FLAGS = 68;   // denser swarm

function buildCurrickulusLogo(color) {
    const group = new THREE.Group();
    const mat = new THREE.MeshBasicMaterial({
        color: color,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.76,
        depthWrite: false
    });

    // Orb + spikes + wings + talons (same clean logo as before)
    group.add(new THREE.Mesh(new THREE.CircleGeometry(0.38, 48), mat));

    const spikeMat = mat.clone();
    const topGeo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array([-0.06,0.37,0, 0.06,0.37,0, 0,0.94,0]), 3));
    topGeo.setIndex([0,1,2]); topGeo.computeVertexNormals();
    group.add(new THREE.Mesh(topGeo, spikeMat));

    const botGeo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array([-0.06,-0.37,0, 0.06,-0.37,0, 0,-0.94,0]), 3));
    botGeo.setIndex([0,1,2]); botGeo.computeVertexNormals();
    group.add(new THREE.Mesh(botGeo, spikeMat));

    const wingGeo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array([
        -0.35,0.20,0, -0.82,0.48,0, -1.18,0.15,0, -1.32,-0.12,0, -0.98,-0.22,0, -0.52,-0.10,0
    ]), 3));
    wingGeo.setIndex([0,1,2,0,2,3,0,3,4,0,4,5]); wingGeo.computeVertexNormals();
    const left = new THREE.Mesh(wingGeo, mat);
    const right = left.clone(); right.scale.x = -1;
    group.add(left); group.add(right);

    function talon(x, y) {
        const tg = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array([x,y,0, x+0.14,y-0.24,0, x+0.29,y-0.45,0]), 3));
        tg.setIndex([0,1,2]); tg.computeVertexNormals();
        group.add(new THREE.Mesh(tg, mat));
    }
    talon(0.24,-0.36); talon(0.45,-0.33); talon(-0.24,-0.36); talon(-0.45,-0.33);

    group.scale.set(1.38, 1.38, 1);
    return group;
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1f);

    camera = new THREE.PerspectiveCamera(54, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(0, 7, 24);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    scene.add(new THREE.AmbientLight(0x99aaff, 0.8));
    const dl1 = new THREE.DirectionalLight(0xffddaa, 1.35); dl1.position.set(15, 22, 12); scene.add(dl1);
    const dl2 = new THREE.DirectionalLight(0xaaffff, 0.95); dl2.position.set(-18, 15, -14); scene.add(dl2);

    const colors = [0xff3366, 0x00eeff, 0xffee44, 0xbb55ff, 0x55ffbb, 0xffaa33, 0xff7733];

    for (let i = 0; i < TOTAL_FLAGS; i++) {
        const logo = buildCurrickulusLogo(colors[i % colors.length]);

        let progress = Math.pow(Math.random(), 0.58);
        const angle = i * 2.399963 + Math.random() * 9;

        logo.position.set(
            (progress * BASE_RADIUS) * Math.cos(angle),
            APEX_Y - progress * CONE_HEIGHT,
            (progress * BASE_RADIUS) * Math.sin(angle)
        );

        logo.userData = {
            angle: angle,
            progress: progress,
            speed: 0.00026 + Math.random() * 0.00019,
            waveOffset: Math.random() * Math.PI * 2
        };

        scene.add(logo);
        flags.push(logo);
    }

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.12;
    controls.minDistance = 12;
    controls.maxDistance = 45;
    controls.target.set(0, 4.5, 0);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

function applyPaintersAlgorithm() {
    const camPos = camera.position;
    flags.sort((a, b) => b.position.distanceToSquared(camPos) - a.position.distanceToSquared(camPos));
    for (let i = 0; i < flags.length; i++) flags[i].renderOrder = i;
}

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    for (let logo of flags) {
        logo.userData.angle += logo.userData.speed * 42;
        logo.userData.progress = Math.min(1.0, logo.userData.progress + logo.userData.speed * 7.5);

        if (logo.userData.progress >= 0.985) {
            logo.userData.progress = 0.03;
            logo.userData.angle += Math.random() * 15;
        }

        // Clean cone with gentle spreading at base (butterfly bloom)
        const spread = 1 + logo.userData.progress * 0.18;   // wider near bottom
        const r = logo.userData.progress * BASE_RADIUS * spread;
        const y = APEX_Y - logo.userData.progress * CONE_HEIGHT;

        logo.position.set(r * Math.cos(logo.userData.angle), y, r * Math.sin(logo.userData.angle));

        // Strict tangent orientation (coplanar to cone)
        const radial = new THREE.Vector3(logo.position.x, 0, logo.position.z).normalize();
        const slope = Math.atan2(BASE_RADIUS, CONE_HEIGHT) * 0.65;
        const normal = new THREE.Vector3(
            radial.x * Math.cos(slope),
            Math.sin(slope),
            radial.z * Math.cos(slope)
        ).normalize();

        const up = new THREE.Vector3(0,1,0);
        const right = new THREE.Vector3().crossVectors(up, normal).normalize();
        const trueUp = new THREE.Vector3().crossVectors(normal, right).normalize();

        logo.matrix.makeBasis(right, trueUp, normal);
        logo.matrix.setPosition(logo.position);
        logo.matrixAutoUpdate = false;
        logo.matrixWorldNeedsUpdate = true;

        // Enhanced breathing + light flutter scale
        const breathe = 1 + Math.sin(t * 3.5 + logo.userData.waveOffset) * 0.022;
        logo.scale.setScalar(breathe);
    }

    applyPaintersAlgorithm();
    controls.update();
    renderer.render(scene, camera);
}

init();
animate();
</script>
</body>
</html>
