<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currickulus Butterfly Volcano • Painter's Algorithm</title>
    <style>
        body { margin:0; overflow:hidden; background:#000; }
        canvas { display:block; }
        #info {
            position:absolute; top:10px; left:10px; color:#fff; font-family:system-ui;
            background:rgba(0,0,0,0.75); padding:12px 16px; border-radius:8px; pointer-events:none;
            max-width:460px; line-height:1.45;
        }
    </style>
</head>
<body>
<div id="info">
    <strong>Butterfly Volcano</strong><br>
    Currickulus Logo Flags • Painter's Algorithm • Invisible Conic Section<br>
    Erupting / descending flow with spreading wings • Multicolored translucent<br>
    Drag to rotate • Scroll to zoom
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script>
// =============== Butterfly Volcano – Currickulus Flags ===============

let scene, camera, renderer, controls, clock;
let flags = [];

const CONE_HEIGHT = 18;
const BASE_RADIUS = 9.2;
const APEX_Y = 10.2;
const TOTAL_FLAGS = 68;   // denser swarm

// ── Logo mesh from the scene (complete, with material + talons) ──────
function buildLogoMesh(color) {
  const group = new THREE.Group();

  // Orb
  const orbGeo = new THREE.CircleGeometry(0.38, 32);
  // Top spike
  const spikeTopGeo = new THREE.BufferGeometry();
  spikeTopGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
    0,0.36,0,  -0.06,0.58,0,  0,0.92,0,  0.06,0.58,0
  ]), 3));
  spikeTopGeo.setIndex([0,1,2, 0,2,3]);
  spikeTopGeo.computeVertexNormals();
  // Bottom spike
  const spikeBotGeo = new THREE.BufferGeometry();
  spikeBotGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
    0,-0.36,0,  0.06,-0.58,0,  0,-0.92,0,  -0.06,-0.58,0
  ]), 3));
  spikeBotGeo.setIndex([0,1,2, 0,2,3]);
  spikeBotGeo.computeVertexNormals();
  // Wings (left) — swept feather shape
  const wingLGeo = new THREE.BufferGeometry();
  wingLGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
    -0.36, 0.22,0,  -0.65,0.52,0,  -0.95,0.18,0,  -1.15,-0.05,0,
    -0.90,-0.10,0,  -0.60,-0.02,0,  -0.38,-0.18,0
  ]), 3));
  wingLGeo.setIndex([0,1,2, 0,2,3, 0,3,4, 0,4,5, 0,5,6]);
  wingLGeo.computeVertexNormals();
  // Wings (right) — mirror
  const wingRGeo = new THREE.BufferGeometry();
  wingRGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
    0.36, 0.22,0,  0.65,0.52,0,  0.95,0.18,0,  1.15,-0.05,0,
    0.90,-0.10,0,  0.60,-0.02,0,  0.38,-0.18,0
  ]), 3));
  wingRGeo.setIndex([0,2,1, 0,3,2, 0,4,3, 0,5,4, 0,6,5]);
  wingRGeo.computeVertexNormals();
  // Talons (4 curved claws)
  function talonGeo(x, y, flipX) {
    const f = flipX ? -1 : 1;
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
      x*f, y, 0,
      (x+0.06)*f, y-0.12, 0,
      (x+0.22)*f, y-0.45, 0,
      (x+0.32)*f, y-0.55, 0,
      (x+0.18)*f, y-0.48, 0,
      (x+0.06)*f, y-0.22, 0,
      (x-0.04)*f, y-0.08, 0,
    ]), 3));
    g.setIndex([0,1,6, 1,5,6, 1,2,5, 2,4,5, 2,3,4]);
    g.computeVertexNormals();
    return g;
  }

  const mat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 0.55 });
  for (const geo of [orbGeo, spikeTopGeo, spikeBotGeo, wingLGeo, wingRGeo,
                     talonGeo(0.22,-0.34,false), talonGeo(0.22,-0.34,true),
                     talonGeo(0.42,-0.28,false),  talonGeo(0.42,-0.28,true)]) {
    group.add(new THREE.Mesh(geo, mat));
  }
  return group;
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1f);

    camera = new THREE.PerspectiveCamera(54, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(0, 7, 24);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    scene.add(new THREE.AmbientLight(0x99aaff, 0.8));
    const dl1 = new THREE.DirectionalLight(0xffddaa, 1.35); dl1.position.set(15, 22, 12); scene.add(dl1);
    const dl2 = new THREE.DirectionalLight(0xaaffff, 0.95); dl2.position.set(-18, 15, -14); scene.add(dl2);

    const colors = [0xff3300, 0x00ccff, 0xffdd00, 0xff00aa, 0x44ff88];

    for (let i = 0; i < TOTAL_FLAGS; i++) {
        const logo = buildLogoMesh(colors[i % colors.length]);

        let progress = Math.pow(Math.random(), 0.58);
        const angle = i * 2.399963 + Math.random() * 9;

        logo.position.set(
            (progress * BASE_RADIUS) * Math.cos(angle),
            APEX_Y - progress * CONE_HEIGHT,
            (progress * BASE_RADIUS) * Math.sin(angle)
        );

        logo.userData = {
            angle: angle,
            progress: progress,
            speed: 0.00026 + Math.random() * 0.00019,
            waveOffset: Math.random() * Math.PI * 2
        };

        scene.add(logo);
        flags.push(logo);
    }

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.12;
    controls.minDistance = 12;
    controls.maxDistance = 45;
    controls.target.set(0, 4.5, 0);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

function applyPaintersAlgorithm() {
    const camPos = camera.position;
    flags.sort((a, b) => b.position.distanceToSquared(camPos) - a.position.distanceToSquared(camPos));
    for (let i = 0; i < flags.length; i++) flags[i].renderOrder = i;
}

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    for (let logo of flags) {
        logo.userData.angle += logo.userData.speed * 42;
        logo.userData.progress = Math.min(1.0, logo.userData.progress + logo.userData.speed * 7.5);

        if (logo.userData.progress >= 0.985) {
            logo.userData.progress = 0.03;
            logo.userData.angle += Math.random() * 15;
        }

        // Clean cone with gentle spreading at base (butterfly bloom)
        const spread = 1 + logo.userData.progress * 0.18;
        const r = logo.userData.progress * BASE_RADIUS * spread;
        const y = APEX_Y - logo.userData.progress * CONE_HEIGHT;

        logo.position.set(r * Math.cos(logo.userData.angle), y, r * Math.sin(logo.userData.angle));

        // Strict tangent orientation (coplanar to cone)
        const radial = new THREE.Vector3(logo.position.x, 0, logo.position.z).normalize();
        const slope = Math.atan2(BASE_RADIUS, CONE_HEIGHT) * 0.65;
        const normal = new THREE.Vector3(
            radial.x * Math.cos(slope),
            Math.sin(slope),
            radial.z * Math.cos(slope)
        ).normalize();

        const up = new THREE.Vector3(0,1,0);
        const right = new THREE.Vector3().crossVectors(up, normal).normalize();
        const trueUp = new THREE.Vector3().crossVectors(normal, right).normalize();

        logo.matrix.makeBasis(right, trueUp, normal);
        logo.matrix.setPosition(logo.position);
        logo.matrixAutoUpdate = false;
        logo.matrixWorldNeedsUpdate = true;

        // Breathing + flutter scale
        const breathe = 1 + Math.sin(t * 3.5 + logo.userData.waveOffset) * 0.022;
        logo.scale.setScalar(breathe);
    }

    applyPaintersAlgorithm();
    controls.update();
    renderer.render(scene, camera);
}

init();
animate();
</script>
</body>
</html>/html>
